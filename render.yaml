services:
  - type: web
    name: rag-agent-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_MAX_RETRIES
        value: "4"
      - key: GROQ_RETRY_BASE_SECONDS
        value: "2"
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en
      - key: STORAGE_DIR
        value: /var/data/storage
      - key: CHROMA_PERSIST_DIR
        value: /var/data/storage/chroma_db
      - key: BM25_INDEX_PATH
        value: /var/data/storage/bm25_index.json
      - key: CHROMA_COLLECTION_NAME
        value: curriculum
      - key: CHUNK_SIZE
        value: "700"
      - key: CHUNK_OVERLAP
        value: "100"
      - key: TOP_K
        value: "5"
      - key: RETRIEVAL_MODE
        value: hybrid
    disk:
      name: rag-agent-storage
      mountPath: /var/data
      sizeGB: 5

  - type: web
    name: rag-agent-ui
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/streamlit_app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: API_URL
        sync: false
